name: Guardicore_connector
options:
  bundleIdPrefix: com.helmsman
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false
  defaultConfig: Debug
  groupSortPosition: none

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: 1.2.0
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.4
  ORSSerialPort:
    url: https://github.com/armadsen/ORSSerialPort
    from: 2.1.0

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    ENABLE_TESTABILITY: YES
    SWIFT_STRICT_CONCURRENCY: minimal

targets:

  # ── App ────────────────────────────────────────────────────────────────────
  Helmsman:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Sources/Helmsman
        excludes:
          - "**/*.entitlements"
    resources:
      - path: Sources/Helmsman/Resources/Assets.xcassets
      - path: Sources/Helmsman/Resources/Snippets
    dependencies:
      - target: TerminalKit
      - target: SSHKit
      - target: VaultKit
      - target: KubeKit
      - target: NetScanKit
      - package: SwiftTerm
        product: SwiftTerm
      - package: Sparkle
        product: Sparkle
      - package: ORSSerialPort
        product: ORSSerial
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.helmsman.app
        PRODUCT_NAME: Guardicore_connector
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ARCHS: "$(ARCHS_STANDARD)"
        INFOPLIST_FILE: Sources/Helmsman/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/Helmsman/Resources/Helmsman.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
      configs:
        Debug:
          OTHER_SWIFT_FLAGS: "-DDEBUG"
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

  # ── TerminalKit ─────────────────────────────────────────────────────────────
  TerminalKit:
    type: framework
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - Sources/TerminalKit
    dependencies:
      - package: SwiftTerm
        product: SwiftTerm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.helmsman.TerminalKit
        DEFINE_MODULE: YES
        SKIP_INSTALL: YES
        GENERATE_INFOPLIST_FILE: YES

  # ── SSHKit ──────────────────────────────────────────────────────────────────
  SSHKit:
    type: framework
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - Sources/SSHKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.helmsman.SSHKit
        DEFINE_MODULE: YES
        SKIP_INSTALL: YES
        GENERATE_INFOPLIST_FILE: YES

  # ── VaultKit ────────────────────────────────────────────────────────────────
  VaultKit:
    type: framework
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - Sources/VaultKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.helmsman.VaultKit
        DEFINE_MODULE: YES
        SKIP_INSTALL: YES
        GENERATE_INFOPLIST_FILE: YES

  # ── KubeKit ─────────────────────────────────────────────────────────────────
  KubeKit:
    type: framework
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - Sources/KubeKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.helmsman.KubeKit
        DEFINE_MODULE: YES
        SKIP_INSTALL: YES
        GENERATE_INFOPLIST_FILE: YES

  # ── NetScanKit ──────────────────────────────────────────────────────────────
  NetScanKit:
    type: framework
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - Sources/NetScanKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.helmsman.NetScanKit
        DEFINE_MODULE: YES
        SKIP_INSTALL: YES
        GENERATE_INFOPLIST_FILE: YES

  # ── Tests ────────────────────────────────────────────────────────────────────
  SSHKitTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/SSHKitTests
    dependencies:
      - target: SSHKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.helmsman.SSHKitTests

  KubeKitTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/KubeKitTests
    dependencies:
      - target: KubeKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.helmsman.KubeKitTests

schemes:
  Helmsman:
    build:
      targets:
        Helmsman: all
        SSHKitTests: [test]
        KubeKitTests: [test]
    run:
      config: Debug
      environmentVariables:
        HELMSMAN_DEBUG: "1"
    test:
      config: Debug
      targets:
        - name: SSHKitTests
          parallelizable: true
        - name: KubeKitTests
          parallelizable: true
    archive:
      config: Release
    profile:
      config: Release
    analyze:
      config: Debug
